name: Deploy alert-service to QA

on:
  push:
    branches:
      - qa

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: qa

    env:
      HOST: ${{ secrets.EC2_ALERT_QA_IP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_ALERT_QA_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Deploy to EC2 QA
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@$HOST << 'EOF'
            echo "✅ Starting deployment"
            sudo dnf update -y
            echo "✅ System updated"
            sudo dnf install -y git docker
            echo "✅ Git and Docker installed"

            sudo systemctl enable --now docker
            sudo usermod -aG docker ec2-user
            echo "✅ Docker service started"

            mkdir -p ~/.docker/cli-plugins
            curl -SL https://github.com/docker/compose/releases/download/v2.27.1/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
            sudo ln -sf ~/.docker/cli-plugins/docker-compose /usr/local/bin/docker-compose
            echo "✅ Docker Compose installed"

            cd /home/ec2-user

            if [ ! -d alert-service ]; then
              git clone --branch qa https://github.com/league-platform/alert-service.git
            fi

            cd alert-service
            sudo chown -R ec2-user:ec2-user .
            git config --global --add safe.directory /home/ec2-user/alert-service
            git reset --hard
            git pull origin qa
            echo "✅ Code updated"

            export JAVA_HOME=/usr/lib/jvm/java-17
            export PATH=$JAVA_HOME/bin:$PATH
            echo "✅ JAVA_HOME set"

            ./gradlew build --no-daemon
            echo "✅ Gradle build completed"

            docker compose down || true
            docker compose up -d --build
            echo "✅ Docker containers started"
          EOF
